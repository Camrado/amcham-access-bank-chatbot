<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AccessBank — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
.brand-sub {
      font-size: 13px;
      color: #64748b;
      margin-top: 4px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 36px 32px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 24px;
    }

    .alert {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 18px;
      display: none;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      color: #0f172a;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus {
      border-color: #1e3a5f;
      box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
    }

    .btn {
      width: 100%;
      padding: 11px;
      background: #1e3a5f;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: 6px;
    }
    .btn:hover { background: #162d4a; }
    .btn:disabled { opacity: 0.6; cursor: default; }

    .footer {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: #64748b;
    }
    .footer a {
      color: #1e3a5f;
      font-weight: 600;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="brand">
      <img src="/accessbank-logo.svg" alt="AccessBank" style="height:36px; margin-bottom:8px; display:block; margin-left:auto; margin-right:auto;">
      <div class="brand-sub">Customer Support Portal</div>
    </div>

    <div class="card">
      <div class="card-title">Sign in to your account</div>
      <div class="alert" id="alert"></div>

      <form id="form" novalidate>
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn" id="btn">Sign in</button>
      </form>
    </div>

    <div class="footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
  </div>

  <script>
    const API = '';

    if (localStorage.getItem('access_token')) {
      window.location.replace('chat.html');
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const alert = document.getElementById('alert');
      alert.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        let data = {};
        try { data = await res.json(); } catch { /* non-JSON error body */ }
        if (!res.ok) throw new Error(data.detail || `Server error (${res.status})`);
        localStorage.setItem('access_token', data.access_token);
        window.location.replace('chat.html');
      } catch (err) {
        alert.textContent = err.message;
        alert.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
