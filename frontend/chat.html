<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AccessBank Support</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #0f172a;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 268px;
      flex-shrink: 0;
      background: #0f1f35;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
.new-chat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: calc(100% - 24px);
      margin: 12px 12px 4px;
      padding: 9px 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .new-chat-btn:hover { background: rgba(255,255,255,0.13); }
    .new-chat-btn svg { flex-shrink: 0; }

    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .conv-group-label {
      padding: 10px 16px 4px;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .conv-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      margin: 1px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
      color: #cbd5e1;
      font-size: 13px;
    }
    .conv-item:hover { background: rgba(255,255,255,0.07); }
    .conv-item.active { background: rgba(255,255,255,0.12); color: #fff; }

    .conv-item-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-item-action {
      display: none;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: none;
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 13px;
      line-height: 1;
      padding: 0;
    }
    .conv-item:hover .conv-item-action { display: flex; }
    .conv-item-action.edit:hover { background: rgba(96,165,250,0.2); color: #60a5fa; }
    .conv-item-action.delete:hover { background: rgba(239,68,68,0.2); color: #f87171; }

    .conv-title-input {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid #60a5fa;
      color: #fff;
      font-size: 13px;
      outline: none;
      padding: 0 2px;
      min-width: 0;
      font-family: inherit;
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #1e3a5f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: #93c5fd;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-size: 13px;
      font-weight: 500;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logout-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: #64748b;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0;
    }
    .logout-btn:hover { background: rgba(239,68,68,0.15); color: #f87171; }

    /* ── Main area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #f8fafc;
    }

    .chat-header {
      padding: 0 24px;
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .chat-header-title {
      font-size: 15px;
      font-weight: 600;
      color: #0f172a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: #cbd5e1 transparent;
    }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #94a3b8;
      text-align: center;
      padding: 40px;
    }
    .empty-state-icon {
      width: 56px;
      height: 56px;
      background: #e2e8f0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    .empty-state h2 { font-size: 18px; font-weight: 600; color: #475569; }
    .empty-state p { font-size: 14px; max-width: 300px; line-height: 1.5; }

    .bubble-row {
      display: flex;
      flex-direction: column;
    }
    .bubble-row.user { align-items: flex-end; }
    .bubble-row.assistant { align-items: flex-start; }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble-row.user .bubble {
      background: #1e3a5f;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bubble-row.assistant .bubble {
      background: #fff;
      color: #0f172a;
      border: 1px solid #e2e8f0;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .bubble-time {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
      padding: 0 4px;
    }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .typing-dot {
      width: 7px;
      height: 7px;
      background: #94a3b8;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── Input area ── */
    .input-area {
      padding: 16px 24px;
      background: #fff;
      border-top: 1px solid #e2e8f0;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-wrap {
      flex: 1;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      display: flex;
      align-items: flex-end;
      padding: 10px 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-wrap:focus-within {
      border-color: #1e3a5f;
      box-shadow: 0 0 0 3px rgba(30,58,95,0.08);
      background: #fff;
    }
    .input-wrap textarea {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 14px;
      color: #0f172a;
      outline: none;
      resize: none;
      max-height: 160px;
      font-family: inherit;
      line-height: 1.5;
    }
    .input-wrap textarea::placeholder { color: #94a3b8; }

    .send-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s, color 0.2s;
      /* inactive state */
      background: #e2e8f0;
      color: #94a3b8;
      cursor: default;
    }
    .send-btn:not(:disabled) {
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
    }
    .send-btn:not(:disabled):hover {
      background: #1d4ed8;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.28);
    }

    .input-hint {
      font-size: 11px;
      color: #94a3b8;
      padding: 0 2px;
      margin-top: 6px;
    }

    /* ── Toast notification ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e3a5f;
      color: #fff;
      padding: 11px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    /* ── Admin link ── */
    .admin-link {
      display: flex;
      align-items: center;
      gap: 8px;
      width: calc(100% - 24px);
      margin: 0 12px 8px;
      padding: 8px 14px;
      background: rgba(250,204,21,0.12);
      border: 1px solid rgba(250,204,21,0.25);
      border-radius: 8px;
      color: #fde68a;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .admin-link:hover { background: rgba(250,204,21,0.2); }

    /* ── Utility ── */
    .hidden { display: none !important; }

    /* ── Mobile: hamburger button (hidden on desktop) ── */
    .menu-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      background: transparent;
      border: none;
      border-radius: 7px;
      color: #64748b;
      cursor: pointer;
      padding: 0;
      transition: background 0.1s;
    }
    .menu-btn:hover { background: rgba(0,0,0,0.05); }

    /* ── Sidebar overlay backdrop ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 199;
    }
    .sidebar-overlay.show { display: block; }

    @media (max-width: 768px) {
      /* Sidebar becomes an off-canvas drawer */
      .sidebar {
        position: fixed;
        left: -268px;
        top: 0;
        height: 100%;
        z-index: 200;
        transition: left 0.25s ease;
      }
      .sidebar.open {
        left: 0;
        box-shadow: 6px 0 28px rgba(0,0,0,0.35);
      }

      /* Show hamburger */
      .menu-btn { display: flex; }

      /* Tighten header */
      .chat-header { padding: 0 14px; gap: 10px; }

      /* Tighten message area */
      .messages { padding: 14px 12px; gap: 12px; }
      .bubble { max-width: 88%; }

      /* Tighten input */
      .input-area { padding: 10px 12px; }
      .input-hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="/accessbank-logo.svg" alt="AccessBank" style="height:22px;">
      </div>

      <a class="admin-link hidden" id="adminLink" href="/admin.html">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <path d="M12 2a5 5 0 100 10A5 5 0 0012 2zM2 20c0-4 4-7 10-7s10 3 10 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        Admin Panel
      </a>

      <button class="new-chat-btn" id="newChatBtn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        New Chat
      </button>

      <div class="conv-list" id="convList"></div>

      <div class="sidebar-footer">
        <div class="user-avatar" id="userAvatar"></div>
        <div class="user-info">
          <div class="user-name" id="userName"></div>
        </div>
        <button class="logout-btn" id="logoutBtn" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="chat-header">
        <button class="menu-btn" id="menuBtn" aria-label="Open sidebar">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="chat-header-title" id="chatTitle">AccessBank Support</div>
      </div>

      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h2>AccessBank Support</h2>
          <p>Start a new conversation or select one from the sidebar to get help.</p>
        </div>
      </div>

      <div class="input-area" id="inputArea">
        <div class="input-row">
          <div class="input-wrap">
            <textarea id="msgInput" placeholder="Message AccessBank Support..." rows="1"></textarea>
          </div>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M14 2L7 9M14 2L9.5 14 7 9 2 6.5 14 2z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
      </div>
    </main>

  </div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="toast" id="toast"></div>

  <script src="/logger.js"></script>
  <script>
    const API = '';

    // ── Auth guard ──
    const token = localStorage.getItem('access_token');
    if (!token) window.location.replace('login.html');

    const authHeaders = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
    };

    // ── Decode JWT payload (no verification — display only) ──
    function parseToken(t) {
      try { return JSON.parse(atob(t.split('.')[1])); } catch { return {}; }
    }

    const claims = parseToken(token);
    if (claims.is_admin) window.location.replace('admin.html');

    const username = claims.username || claims.email || 'User';
    logger.info('chat: UI loaded for user', username);
    document.getElementById('userName').textContent = username;
    document.getElementById('userAvatar').textContent = username[0].toUpperCase();

    // ── State ──
    let currentConvId = null;

    // ── API helpers ──
    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API}${path}`, {
        ...options,
        headers: { ...authHeaders, ...(options.headers || {}) },
      });
      if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
      return res;
    }

    function logout() {
      localStorage.removeItem('access_token');
      window.location.replace('login.html');
    }

    // ── Date grouping ──
    function dateLabel(isoString) {
      const d = new Date(isoString);
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(today.getDate() - 1);
      if (d.toDateString() === today.toDateString()) return 'Today';
      if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatTime(isoString) {
      return new Date(isoString).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    // ── Inline title edit ──
    function startTitleEdit(id, currentTitle, titleEl) {
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'conv-title-input';
      input.value = currentTitle;
      titleEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;

      async function save() {
        if (saved) return;
        saved = true;
        const newTitle = input.value.trim();
        if (!newTitle || newTitle === currentTitle) {
          input.replaceWith(titleEl);
          return;
        }
        await apiFetch(`/conversations/${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ title: newTitle }),
        });
        if (currentConvId === id) {
          document.getElementById('chatTitle').textContent = newTitle;
        }
        await loadConversations();
      }

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); save(); }
        if (e.key === 'Escape') { saved = true; input.replaceWith(titleEl); }
      });
      input.addEventListener('blur', save);
    }

    // ── Load conversations ──
    async function loadConversations() {
      const res = await apiFetch('/conversations');
      const convs = await res.json();
      renderConversations(convs);
    }

    function renderConversations(convs) {
      const list = document.getElementById('convList');
      list.innerHTML = '';

      if (convs.length === 0) {
        list.innerHTML = '<div style="padding:16px;font-size:12px;color:#475569;text-align:center;">No conversations yet</div>';
        return;
      }

      const groups = {};
      for (const c of convs) {
        const label = dateLabel(c.created_at);
        if (!groups[label]) groups[label] = [];
        groups[label].push(c);
      }

      for (const [label, items] of Object.entries(groups)) {
        const groupEl = document.createElement('div');
        groupEl.className = 'conv-group-label';
        groupEl.textContent = label;
        list.appendChild(groupEl);

        for (const conv of items) {
          const item = document.createElement('div');
          item.className = 'conv-item' + (conv.id === currentConvId ? ' active' : '');
          item.dataset.id = conv.id;
          item.innerHTML = `
            <span class="conv-item-title">${escapeHtml(conv.title)}</span>
            <button class="conv-item-action edit" title="Rename">
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                <path d="M8.5 1.5a1.414 1.414 0 012 2L3.5 10.5l-3 .5.5-3 7.5-6.5z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="conv-item-action delete" title="Delete">&#x2715;</button>
          `;
          item.addEventListener('click', (e) => {
            if (e.target.closest('.conv-item-action')) return;
            selectConversation(conv.id, conv.title);
          });
          item.querySelector('.conv-item-action.edit').addEventListener('click', (e) => {
            e.stopPropagation();
            startTitleEdit(conv.id, conv.title, item.querySelector('.conv-item-title'));
          });
          item.querySelector('.conv-item-action.delete').addEventListener('click', (e) => {
            e.stopPropagation();
            deleteConversation(conv.id);
          });
          list.appendChild(item);
        }
      }
    }

    // ── Select conversation ──
    async function selectConversation(id, title) {
      logger.info('chat: conversation selected', id);
      stopPolling();
      closeSidebar();
      currentConvId = id;
      lastMessageId = 0;
      document.getElementById('chatTitle').textContent = title;

      // Highlight active
      document.querySelectorAll('.conv-item').forEach(el => {
        el.classList.toggle('active', Number(el.dataset.id) === id);
      });

      // Load messages
      const messagesEl = document.getElementById('messages');
      messagesEl.innerHTML = '';
      const res = await apiFetch(`/conversations/${id}/messages`);
      const msgs = await res.json();

      if (msgs.length === 0) {
        messagesEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h2>New Conversation</h2>
            <p>Type your message below to get started.</p>
          </div>`;
      } else {
        for (const msg of msgs) appendBubble(msg.role, msg.content, msg.created_at);
        scrollToBottom();
      }
      if (msgs.length) lastMessageId = msgs[msgs.length - 1].id;
      startPolling(id);
    }

    // ── New chat ──
    document.getElementById('newChatBtn').addEventListener('click', async () => {
      const res = await apiFetch('/conversations', { method: 'POST' });
      const conv = await res.json();
      await loadConversations();
      selectConversation(conv.id, conv.title);
    });

    // ── Delete conversation ──
    async function deleteConversation(id) {
      await apiFetch(`/conversations/${id}`, { method: 'DELETE' });
      if (currentConvId === id) {
        stopPolling();
        currentConvId = null;
        document.getElementById('chatTitle').textContent = 'AccessBank Support';
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('messages').innerHTML = `
          <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h2>AccessBank Support</h2>
            <p>Start a new conversation or select one from the sidebar to get help.</p>
          </div>`;
      }
      await loadConversations();
    }

    // ── Send message ──
    async function sendMessage() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text) return;

      // Auto-create a conversation if none is open
      if (!currentConvId) {
        const res = await apiFetch('/conversations', { method: 'POST' });
        const conv = await res.json();
        currentConvId = conv.id;
        document.getElementById('chatTitle').textContent = conv.title;
      }

      input.value = '';
      input.style.height = 'auto';
      document.getElementById('sendBtn').disabled = true;

      // Remove empty state if present
      const emptyState = document.getElementById('emptyState');
      if (emptyState) emptyState.remove();

      appendBubble('user', text);
      scrollToBottom();

      // Typing indicator
      const typingRow = document.createElement('div');
      typingRow.className = 'bubble-row assistant';
      typingRow.id = 'typing';
      typingRow.innerHTML = `
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>`;
      document.getElementById('messages').appendChild(typingRow);
      scrollToBottom();

      try {
        logger.info('chat: sending message to conv', currentConvId);
        const res = await apiFetch('/chat', {
          method: 'POST',
          body: JSON.stringify({ conversation_id: currentConvId, message: text }),
        });
        const data = await res.json();
        typingRow.remove();
        appendBubble('assistant', data.reply);
        scrollToBottom();

        // Refresh sidebar to pick up updated title
        await loadConversations();
        // Sync lastMessageId so the poller doesn't re-render these messages
        const savedConvId = currentConvId;
        if (savedConvId) {
          const syncRes = await apiFetch(`/conversations/${savedConvId}/messages`);
          const syncMsgs = await syncRes.json();
          if (syncMsgs.length) lastMessageId = syncMsgs[syncMsgs.length - 1].id;
        }
      } catch (err) {
        logger.error('chat: send message failed -', err.message);
        typingRow.remove();
        appendBubble('assistant', 'Something went wrong. Please try again.');
        scrollToBottom();
      }

      document.getElementById('sendBtn').disabled = true; // input was cleared
      input.focus();
    }

    // ── Render helpers ──
    function appendBubble(role, content, isoTime) {
      const row = document.createElement('div');
      row.className = `bubble-row ${role}`;
      const time = isoTime ? formatTime(isoTime) : formatTime(new Date().toISOString());
      row.innerHTML = `
        <div class="bubble">${escapeHtml(content)}</div>
        <div class="bubble-time">${time}</div>`;
      document.getElementById('messages').appendChild(row);
    }

    function scrollToBottom() {
      const el = document.getElementById('messages');
      el.scrollTop = el.scrollHeight;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Input auto-resize + keyboard shortcut ──
    const msgInput = document.getElementById('msgInput');
    msgInput.addEventListener('input', () => {
      msgInput.style.height = 'auto';
      msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
      document.getElementById('sendBtn').disabled = !msgInput.value.trim();
    });
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
      // Shift+Enter falls through naturally — browser inserts a newline
    });

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('logoutBtn').addEventListener('click', logout);

    // ── Toast ──
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => toast.classList.remove('show'), 4000);
    }

    // ── Polling for new messages (e.g. admin replies) ──
    let pollInterval = null;
    let lastMessageId = 0;

    function startPolling(convId) {
      stopPolling();
      pollInterval = setInterval(() => pollMessages(convId), 10000);
    }

    function stopPolling() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    async function pollMessages(convId) {
      if (convId !== currentConvId || document.getElementById('typing')) return;
      try {
        const res = await apiFetch(`/conversations/${convId}/messages`);
        const msgs = await res.json();
        const newMsgs = msgs.filter(m => m.id > lastMessageId);
        if (!newMsgs.length) return;
        lastMessageId = msgs[msgs.length - 1].id;
        const messagesEl = document.getElementById('messages');
        const emptyState = messagesEl.querySelector('.empty-state');
        if (emptyState) emptyState.remove();
        const hasNewAssistant = newMsgs.some(m => m.role === 'assistant');
        for (const msg of newMsgs) appendBubble(msg.role, msg.content, msg.created_at);
        if (hasNewAssistant) { scrollToBottom(); showToast('New reply from support team'); }
      } catch {}
    }

    // ── Mobile sidebar ──
    function openSidebar() {
      document.querySelector('.sidebar').classList.add('open');
      document.getElementById('sidebarOverlay').classList.add('show');
    }
    function closeSidebar() {
      document.querySelector('.sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('show');
    }
    document.getElementById('menuBtn').addEventListener('click', () => {
      document.querySelector('.sidebar').classList.contains('open') ? closeSidebar() : openSidebar();
    });
    document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

    // ── Init ──
    loadConversations();
  </script>
</body>
</html>
