<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — AccessBank Support</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #0f172a;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      height: 54px;
      background: #4338ca;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      flex-shrink: 0;
      box-shadow: 0 1px 8px rgba(67,56,202,0.3);
    }

    .topbar-logo { height: 20px; filter: brightness(0) invert(1); opacity: 0.95; }

    .topbar-divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.25);
    }

    .topbar-label {
      font-size: 13px;
      font-weight: 600;
      color: #c7d2fe;
      letter-spacing: 0.3px;
    }

    .topbar-spacer { flex: 1; }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .topbar-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    .topbar-username {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
    }

    .topbar-logout {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      margin-left: 4px;
      transition: background 0.15s, color 0.15s;
    }
    .topbar-logout:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* ── Body below top bar ── */
    .body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar (light) ── */
    .sidebar {
      width: 272px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-heading {
      padding: 16px 18px 10px;
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      border-bottom: 1px solid #f3f4f6;
    }

    /* Stats chips */
    .sidebar-stats {
      display: flex;
      gap: 8px;
      padding: 12px 18px;
      border-bottom: 1px solid #f3f4f6;
    }

    .stat-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      background: #f5f3ff;
      border-radius: 8px;
      padding: 8px 6px;
    }

    .stat-chip-value {
      font-size: 18px;
      font-weight: 700;
      color: #4338ca;
      line-height: 1;
    }

    .stat-chip-label {
      font-size: 10px;
      font-weight: 500;
      color: #7c3aed;
      margin-top: 3px;
      opacity: 0.75;
    }

    .stat-chip.warn { background: #fffbeb; }
    .stat-chip.warn .stat-chip-value { color: #d97706; }
    .stat-chip.warn .stat-chip-label { color: #92400e; }

    /* User list */
    .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
      scrollbar-width: thin;
      scrollbar-color: #e5e7eb transparent;
    }
    .user-list::-webkit-scrollbar { width: 4px; }
    .user-list::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      margin: 1px 6px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
      color: #374151;
    }
    .user-item:hover { background: #f9fafb; }
    .user-item.active { background: #eef2ff; }

    .user-item-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #e0e7ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #4338ca;
      flex-shrink: 0;
    }
    .user-item.active .user-item-avatar { background: #c7d2fe; }

    .user-item-info { flex: 1; min-width: 0; }
    .user-item-name {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-item.active .user-item-name { color: #3730a3; }
    .user-item-email { font-size: 11px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .badge-open {
      min-width: 20px;
      height: 20px;
      background: #f59e0b;
      color: #fff;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      flex-shrink: 0;
    }

    /* ── Main content ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f5f5f5; }

    .main-header {
      height: 52px;
      padding: 0 24px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .main-header-title { font-size: 14px; font-weight: 600; color: #374151; }
    .main-header-sub { font-size: 12px; color: #9ca3af; margin-left: 8px; }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: #d1d5db transparent;
    }
    .content::-webkit-scrollbar { width: 5px; }
    .content::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    /* Empty / loading states */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #9ca3af;
      text-align: center;
    }
    .empty-state-icon {
      width: 52px;
      height: 52px;
      background: #e5e7eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    .empty-state h2 { font-size: 16px; font-weight: 600; color: #6b7280; }
    .empty-state p { font-size: 13px; max-width: 260px; line-height: 1.5; }
    .loading-text { color: #9ca3af; font-size: 13px; text-align: center; padding: 40px; }

    /* ── Conversation accordion card ── */
    .conv-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }
    .conv-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

    .conv-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    .conv-card-header:hover { background: #fafafa; }
    .conv-card.open > .conv-card-header { background: #fafafa; border-bottom: 1px solid #f3f4f6; }

    .conv-chevron {
      flex-shrink: 0;
      color: #d1d5db;
      transition: transform 0.2s ease, color 0.15s;
    }
    .conv-card:hover .conv-chevron,
    .conv-card.open .conv-chevron { color: #6b7280; }
    .conv-card.open .conv-chevron { transform: rotate(90deg); }

    .conv-card-title {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
      color: #1f2937;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dept-tag {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .conv-card-date { flex-shrink: 0; font-size: 11px; color: #9ca3af; }

    /* Collapsible body */
    .conv-card-body {
      display: none;
      flex-direction: column;
      gap: 14px;
      padding: 16px;
    }
    .conv-card.open > .conv-card-body { display: flex; }

    /* ── Message thread ── */
    .thread-scroll {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid #f3f4f6;
      border-radius: 8px;
      padding: 10px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: #e5e7eb transparent;
    }
    .thread-scroll::-webkit-scrollbar { width: 4px; }
    .thread-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }

    .msg-row { display: flex; flex-direction: column; gap: 2px; }
    .msg-row.msg-user { align-items: flex-end; }
    .msg-row.msg-assistant { align-items: flex-start; }

    .msg-sender { font-size: 10px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.4px; }
    .msg-bubble {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-row.msg-user .msg-bubble { background: #4338ca; color: #fff; border-bottom-right-radius: 3px; }
    .msg-row.msg-assistant .msg-bubble { background: #fff; color: #111827; border: 1px solid #e5e7eb; border-bottom-left-radius: 3px; }
    .msg-time { font-size: 10px; color: #9ca3af; }
    .no-messages { font-size: 12px; color: #9ca3af; text-align: center; padding: 12px; }

    /* ── Escalation case section ── */
    .case-section {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }

    .case-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #f9fafb;
      border-bottom: 1px solid #f3f4f6;
    }
    .case-section-label { font-size: 11px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .case-dept { font-size: 13px; font-weight: 600; color: #374151; }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .status-open { background: #fef3c7; color: #b45309; }
    .status-resolved { background: #d1fae5; color: #065f46; }

    .case-section-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

    .case-meta { display: flex; flex-direction: column; gap: 4px; }
    .meta-row { display: flex; align-items: baseline; gap: 6px; font-size: 13px; color: #374151; }
    .meta-label {
      font-size: 10px;
      font-weight: 700;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      min-width: 68px;
    }
    .meta-code {
      font-size: 11px;
      color: #6b7280;
      background: #f3f4f6;
      padding: 1px 6px;
      border-radius: 3px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .issue-box {
      font-size: 13px;
      color: #374151;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 9px 12px;
      line-height: 1.5;
    }

    /* ── Reply form ── */
    .reply-section { display: flex; flex-direction: column; gap: 8px; }
    .reply-label { font-size: 10px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .reply-textarea {
      width: 100%;
      min-height: 78px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: inherit;
      color: #111827;
      background: #fff;
      outline: none;
      resize: vertical;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .reply-textarea:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
    .reply-actions { display: flex; justify-content: flex-end; }
    .reply-btn {
      padding: 9px 18px;
      background: #4338ca;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .reply-btn:hover:not(:disabled) { background: #3730a3; box-shadow: 0 0 0 3px rgba(67,56,202,0.15); }
    .reply-btn:disabled { opacity: 0.5; cursor: default; }

    .resolved-section { display: flex; flex-direction: column; gap: 6px; }
    .resolved-label { font-size: 10px; font-weight: 700; color: #065f46; text-transform: uppercase; letter-spacing: 0.5px; }
    .resolved-text {
      font-size: 13px;
      color: #065f46;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      border-radius: 6px;
      padding: 9px 12px;
      line-height: 1.5;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1b4b;
      color: #fff;
      padding: 11px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #15803d; }
    .toast.error { background: #dc2626; }

    .no-users { padding: 20px 16px; font-size: 12px; color: #9ca3af; text-align: center; }

    /* ── Mobile: hamburger in topbar (hidden on desktop) ── */
    .menu-btn-topbar {
      display: none;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      padding: 0;
      margin-right: 2px;
      transition: background 0.1s;
      flex-shrink: 0;
    }
    .menu-btn-topbar:hover { background: rgba(255,255,255,0.12); }

    /* ── Sidebar overlay backdrop ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 54px;
      left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 199;
    }
    .sidebar-overlay.show { display: block; }

    @media (max-width: 768px) {
      /* Topbar: hide username to save space, show hamburger */
      .topbar { padding: 0 14px; }
      .topbar-username { display: none; }
      .menu-btn-topbar { display: flex; }

      /* Sidebar becomes an off-canvas drawer below the topbar */
      .sidebar {
        position: fixed;
        left: -272px;
        top: 54px;
        height: calc(100% - 54px);
        z-index: 200;
        border-right: none;
        transition: left 0.25s ease;
      }
      .sidebar.open {
        left: 0;
        box-shadow: 4px 0 24px rgba(0,0,0,0.18);
      }

      /* Tighten content area */
      .content { padding: 14px 12px; }
      .main-header { padding: 0 14px; }

      /* On mobile, hide the date in card headers to save space */
      .conv-card-date { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Top bar -->
    <header class="topbar">
      <button class="menu-btn-topbar" id="menuBtn" aria-label="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <img class="topbar-logo" src="/accessbank-logo.svg" alt="AccessBank">
      <div class="topbar-divider"></div>
      <span class="topbar-label">Admin Panel</span>
      <div class="topbar-spacer"></div>
      <div class="topbar-user">
        <div class="topbar-avatar" id="userAvatar"></div>
        <span class="topbar-username" id="userName"></span>
      </div>
      <button class="topbar-logout" id="logoutBtn" title="Sign out">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </header>

    <!-- Body -->
    <div class="body">

      <!-- Sidebar (light) -->
      <aside class="sidebar">
        <div class="sidebar-heading">Customers</div>
        <div class="sidebar-stats" id="sidebarStats">
          <div class="stat-chip">
            <div class="stat-chip-value" id="statCustomers">—</div>
            <div class="stat-chip-label">Customers</div>
          </div>
          <div class="stat-chip warn">
            <div class="stat-chip-value" id="statOpen">—</div>
            <div class="stat-chip-label">Open Cases</div>
          </div>
        </div>
        <div class="user-list" id="userList"></div>
      </aside>

      <!-- Main -->
      <main class="main">
        <div class="main-header">
          <div class="main-header-title" id="mainTitle">Overview</div>
          <div class="main-header-sub" id="mainSub"></div>
        </div>
        <div class="content" id="content">
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h2>Select a customer</h2>
            <p>Choose a customer from the sidebar to review their conversations.</p>
          </div>
        </div>
      </main>

    </div>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="toast" id="toast"></div>

  <script>
    const API = '';
    const token = localStorage.getItem('access_token');
    if (!token) window.location.replace('login.html');

    function parseToken(t) {
      try { return JSON.parse(atob(t.split('.')[1])); } catch { return {}; }
    }
    const claims = parseToken(token);
    if (!claims.is_admin) window.location.replace('chat.html');

    const authHeaders = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
    };

    const displayName = claims.username || claims.email || 'Admin';
    document.getElementById('userName').textContent = displayName;
    document.getElementById('userAvatar').textContent = displayName[0].toUpperCase();

    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API}${path}`, {
        ...options,
        headers: { ...authHeaders, ...(options.headers || {}) },
      });
      if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
      return res;
    }

    function logout() {
      localStorage.removeItem('access_token');
      window.location.replace('login.html');
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatTime(isoString) {
      return new Date(isoString).toLocaleString('en-US', {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
      });
    }

    function showToast(msg, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast show ${type}`;
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => { toast.classList.remove('show'); }, 4000);
    }

    // ── Department tag colours ──
    const TAG_PALETTE = [
      { bg: '#e0e7ff', text: '#3730a3' }, // indigo
      { bg: '#ede9fe', text: '#5b21b6' }, // violet
      { bg: '#cffafe', text: '#0e7490' }, // cyan
      { bg: '#d1fae5', text: '#065f46' }, // emerald
      { bg: '#fce7f3', text: '#9d174d' }, // pink
    ];
    const GENERAL_TAG = { bg: '#f3f4f6', text: '#6b7280' };

    function deptTagStyle(dept) {
      if (!dept) return GENERAL_TAG;
      let hash = 0;
      for (let i = 0; i < dept.length; i++) hash = (hash + dept.charCodeAt(i)) | 0;
      return TAG_PALETTE[Math.abs(hash) % TAG_PALETTE.length];
    }

    function deptTagHtml(dept) {
      const label = dept || 'General';
      const { bg, text } = deptTagStyle(dept);
      return `<span class="dept-tag" style="background:${bg};color:${text}">${escapeHtml(label)}</span>`;
    }

    // ── Users ──
    let selectedUserId = null;
    let selectedUserName = '';

    async function loadUsers() {
      const res = await apiFetch('/admin/users');
      const users = await res.json();

      // Update stats
      const openTotal = users.reduce((s, u) => s + u.open_cases, 0);
      document.getElementById('statCustomers').textContent = users.length;
      document.getElementById('statOpen').textContent = openTotal;

      renderUsers(users);
    }

    function renderUsers(users) {
      const list = document.getElementById('userList');
      if (users.length === 0) {
        list.innerHTML = '<div class="no-users">No customers yet</div>';
        return;
      }
      list.innerHTML = '';
      for (const u of users) {
        const item = document.createElement('div');
        item.className = 'user-item' + (u.id === selectedUserId ? ' active' : '');
        item.dataset.id = u.id;
        item.innerHTML = `
          <div class="user-item-avatar">${escapeHtml(u.username[0].toUpperCase())}</div>
          <div class="user-item-info">
            <div class="user-item-name">${escapeHtml(u.username)}</div>
            <div class="user-item-email">${escapeHtml(u.email)}</div>
          </div>
          ${u.open_cases > 0 ? `<div class="badge-open">${u.open_cases}</div>` : ''}
        `;
        item.addEventListener('click', () => selectUser(u.id, u.username));
        list.appendChild(item);
      }
    }

    // ── Conversations ──
    async function selectUser(userId, username) {
      closeSidebar();
      selectedUserId = userId;
      selectedUserName = username;
      document.getElementById('mainTitle').textContent = username;
      document.getElementById('mainSub').textContent = 'Conversations';
      document.querySelectorAll('.user-item').forEach(el => {
        el.classList.toggle('active', Number(el.dataset.id) === userId);
      });

      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading-text">Loading conversations…</div>';

      const res = await apiFetch(`/admin/users/${userId}/conversations`);
      const conversations = await res.json();
      renderConversations(conversations);
    }

    function renderConversations(conversations) {
      const content = document.getElementById('content');
      if (conversations.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h2>No conversations</h2>
            <p>This customer has not started any conversations yet.</p>
          </div>`;
        return;
      }

      content.innerHTML = '';
      for (const conv of conversations) {
        const card = document.createElement('div');
        card.className = 'conv-card';

        // Left border accent using department colour
        const dept = conv.case ? conv.case.department : null;
        const { text: accentColor } = deptTagStyle(dept);
        card.style.borderLeft = `3px solid ${accentColor}`;

        card.innerHTML = buildConvCard(conv);
        card.querySelector('.conv-card-header').addEventListener('click', () => {
          card.classList.toggle('open');
        });
        content.appendChild(card);
      }
    }

    function buildConvCard(conv) {
      const dept = conv.case ? conv.case.department : null;

      const threadHtml = conv.messages.length > 0
        ? `<div class="thread-scroll">${conv.messages.map(m => `
            <div class="msg-row msg-${m.role}">
              <div class="msg-sender">${m.role === 'user' ? 'Customer' : 'Support'}</div>
              <div class="msg-bubble">${escapeHtml(m.content)}</div>
              <div class="msg-time">${formatTime(m.created_at)}</div>
            </div>`).join('')}
          </div>`
        : '<div class="no-messages">No messages in this conversation.</div>';

      const caseHtml = conv.case ? buildCaseSection(conv.case) : '';

      return `
        <div class="conv-card-header">
          <svg class="conv-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="conv-card-title">${escapeHtml(conv.title)}</div>
          ${deptTagHtml(dept)}
          <div class="conv-card-date">${formatTime(conv.created_at)}</div>
        </div>
        <div class="conv-card-body">
          ${threadHtml}
          ${caseHtml}
        </div>`;
    }

    function buildCaseSection(c) {
      const statusClass = c.status === 'open' ? 'status-open' : 'status-resolved';
      const statusLabel = c.status === 'open' ? 'Open' : 'Resolved';

      const emailRef = c.email_ref
        ? `<div class="meta-row"><span class="meta-label">Email Ref</span><span class="meta-code">${escapeHtml(c.email_ref)}</span></div>`
        : '';

      const actionHtml = c.status === 'open' ? `
        <div class="reply-section">
          <div class="reply-label">Reply to customer</div>
          <textarea class="reply-textarea" id="reply-${c.id}" placeholder="Type your response…"></textarea>
          <div class="reply-actions">
            <button class="reply-btn" id="reply-btn-${c.id}" onclick="sendReply(${c.id})">
              Send Reply &amp; Close Case
            </button>
          </div>
        </div>` : c.admin_reply ? `
        <div class="resolved-section">
          <div class="resolved-label">Admin reply sent</div>
          <div class="resolved-text">${escapeHtml(c.admin_reply)}</div>
        </div>` : '';

      return `
        <div class="case-section">
          <div class="case-section-header">
            <span class="case-section-label">Escalation</span>
            <span class="case-dept">${escapeHtml(c.department)}</span>
            <span class="status-badge ${statusClass}">${statusLabel}</span>
          </div>
          <div class="case-section-body">
            <div class="case-meta">
              <div class="meta-row"><span class="meta-label">Name</span>${escapeHtml(c.user_name)}</div>
              <div class="meta-row"><span class="meta-label">Contact</span>${escapeHtml(c.user_contact)}</div>
              ${emailRef}
            </div>
            <div class="issue-box">${escapeHtml(c.issue_summary)}</div>
            ${actionHtml}
          </div>
        </div>`;
    }

    async function sendReply(caseId) {
      const textarea = document.getElementById(`reply-${caseId}`);
      const btn = document.getElementById(`reply-btn-${caseId}`);
      const replyText = textarea ? textarea.value.trim() : '';
      if (!replyText) { showToast('Please enter a reply before sending.', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Sending…';

      try {
        const res = await apiFetch(`/admin/cases/${caseId}/reply`, {
          method: 'POST',
          body: JSON.stringify({ reply_text: replyText }),
        });
        if (!res.ok) throw new Error('Failed');
        showToast('Reply sent and case closed.', 'success');
        await Promise.all([loadUsers(), selectUser(selectedUserId, selectedUserName)]);
      } catch {
        btn.disabled = false;
        btn.textContent = 'Send Reply & Close Case';
        showToast('Failed to send reply. Please try again.', 'error');
      }
    }

    // ── Mobile sidebar ──
    function openSidebar() {
      document.querySelector('.sidebar').classList.add('open');
      document.getElementById('sidebarOverlay').classList.add('show');
    }
    function closeSidebar() {
      document.querySelector('.sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('show');
    }
    document.getElementById('menuBtn').addEventListener('click', () => {
      document.querySelector('.sidebar').classList.contains('open') ? closeSidebar() : openSidebar();
    });
    document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

    document.getElementById('logoutBtn').addEventListener('click', logout);
    loadUsers();
  </script>
</body>
</html>
